server:
  port: 8082

spring:
  application:
    name: account-service   # Gateway routes /accounts/** here
    # Transfer service Feign uses this name too

  datasource:
    url: jdbc:postgresql://localhost:5432/account_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # Hibernate creates account + transaction tables
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: hclbank-super-secret-jwt-key-must-be-32-chars-min
  # Must be IDENTICAL to auth-service secret
  # JwtAuthFilter validates tokens signed by auth-service

# Eureka — account-service registers itself on startup
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Run first: CREATE DATABASE account_db;