server:
  port: 8081

spring:
  application:
    name: auth-service   # Gateway routes /auth/** to this name via Eureka

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # Hibernate reads Customer.java → creates table
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: hclbank-super-secret-jwt-key-must-be-32-chars-min
  expiration: 1800000   # 30 minutes in ms

# Eureka — auth-service registers itself here on startup
# Gateway finds it by name "auth-service"
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Run first: CREATE DATABASE auth_db;